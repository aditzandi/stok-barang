<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stok Barang</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --white: #ffffff;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --green: #10b981;
    --green-light: #ecfdf5;
    --red: #ef4444;
    --red-light: #fef2f2;
    --orange: #f59e0b;
    --orange-light: #fffbeb;
    --text: #1e293b;
    --muted: #94a3b8;
    --sub: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 32px;
  }

  .topbar {
    background: var(--accent);
    padding: 20px 20px 28px;
    position: relative;
    overflow: hidden;
  }

  .topbar::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    border-radius: 24px 24px 0 0;
  }

  .topbar h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .topbar p { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }

  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #a5f3c0;
  }

  .sync-dot.loading { background: #fde68a; animation: pulse 1s infinite; }
  .sync-dot.error { background: #fca5a5; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px;
    margin-top: -4px;
    position: relative;
    z-index: 1;
  }

  .sum-card {
    background: var(--white);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .sum-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .sum-val { font-size: 20px; font-weight: 800; margin-top: 4px; color: var(--text); }
  .sum-val.green { color: var(--green); }
  .sum-val.accent { color: var(--accent); }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 20px 20px 10px;
  }

  .items { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }

  .item-card {
    background: var(--white);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .item-card:focus-within { border-color: var(--accent); }

  .item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .item-name-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }

  .item-num {
    width: 28px; height: 28px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .item-name {
    font-size: 15px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    width: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    caret-color: var(--accent);
  }

  .item-name::placeholder { color: var(--muted); font-weight: 500; }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .inp-group { display: flex; flex-direction: column; gap: 5px; }

  .inp-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    padding-left: 2px;
  }

  .inp-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .inp-wrap:focus-within { border-color: var(--accent); background: var(--accent-light); }

  .inp-prefix {
    padding: 0 8px 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    user-select: none;
  }

  .inp-wrap input {
    border: none;
    outline: none;
    background: transparent;
    padding: 11px 12px 11px 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    width: 100%;
    -moz-appearance: textfield;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .stok-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stok-wrap:focus-within { border-color: var(--accent); }

  .stok-btn {
    background: transparent;
    border: none;
    padding: 11px 14px;
    font-size: 18px;
    font-weight: 700;
    color: var(--sub);
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1;
    user-select: none;
  }

  .stok-btn:active { background: var(--border); }

  .stok-wrap input {
    border: none;
    outline: none;
    background: transparent;
    padding: 11px 0;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
  }

  .item-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-orange { background: var(--orange-light); color: var(--orange); }
  .badge-red { background: var(--red-light); color: var(--red); }

  .nilai-barang { font-size: 12px; font-weight: 600; color: var(--sub); }
  .nilai-barang span { color: var(--accent); font-weight: 800; }

  .save-wrap { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 10px; }

  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  }

  .btn-save:active { transform: scale(0.98); }
  .btn-save:disabled { opacity: 0.6; }

  .last-saved {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1e293b;
    color: #fff;
    padding: 12px 22px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { background: #065f46; }
  .toast.error { background: #7f1d1d; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📦 Stok Barang</h1>
  <p>Tersinkron dengan GitHub Gist</p>
  <div class="sync-status">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncText">Memuat data...</span>
  </div>
</div>

<div class="summary">
  <div class="sum-card">
    <div class="sum-label">Total Stok</div>
    <div class="sum-val accent" id="sumStok">—</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Nilai Total</div>
    <div class="sum-val green" id="sumNilai">—</div>
  </div>
</div>

<div class="section-title">Daftar Barang</div>
<div class="items" id="itemList"></div>

<div class="save-wrap">
  <button class="btn-save" id="btnSave" onclick="simpan()" disabled>💾 Simpan ke GitHub</button>
  <div class="last-saved" id="lastSaved"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const GIST_ID = '27a18d6eadf44aae344834595e23706e';
  const TOKEN = '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';
  const FILE = 'stok.json';
  const DEFAULTS = [
    'Beras 5kg', 'Minyak Goreng', 'Gula Pasir', 'Tepung Terigu', 'Kopi Sachet'
  ];

  let data = [];

  function fmtRp(n) {
    if (n >= 1000000) return 'Rp' + (n/1000000).toFixed(1).replace('.0','') + 'jt';
    if (n >= 1000) return 'Rp' + (n/1000).toFixed(0) + 'rb';
    return 'Rp' + n;
  }

  function fmtRpFull(n) {
    return 'Rp' + Number(n).toLocaleString('id-ID');
  }

  function statusInfo(stok) {
    if (stok === 0) return { label: '❌ Habis', cls: 'badge-red', dot: '#ef4444' };
    if (stok <= 5) return { label: '⚠️ Rendah', cls: 'badge-orange', dot: '#f59e0b' };
    return { label: '✅ Aman', cls: 'badge-green', dot: '#10b981' };
  }

  function setSyncStatus(state, text) {
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    dot.className = 'sync-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
    txt.textContent = text;
  }

  async function loadFromGist() {
    setSyncStatus('loading', 'Memuat data...');
    try {
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: {
          'Authorization': `token ${TOKEN}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });
      if (!res.ok) throw new Error('Gagal load');
      const gist = await res.json();
      const content = gist.files[FILE]?.content || '{}';
      const parsed = JSON.parse(content);

      if (parsed.items && Array.isArray(parsed.items)) {
        data = parsed.items;
      } else {
        data = DEFAULTS.map((nama, i) => ({ id: i, nama, harga: 0, stok: 0 }));
      }

      const lastSave = parsed.lastSaved;
      if (lastSave) {
        document.getElementById('lastSaved').textContent = 'Terakhir disimpan: ' + new Date(lastSave).toLocaleString('id-ID');
      }

      setSyncStatus('ok', 'Tersinkron ✓');
      document.getElementById('btnSave').disabled = false;
      render();
    } catch (e) {
      setSyncStatus('error', 'Gagal memuat, pakai data lokal');
      const local = localStorage.getItem('stokku_hp');
      if (local) {
        const parsed = JSON.parse(local);
        data = parsed.items || DEFAULTS.map((nama, i) => ({ id: i, nama, harga: 0, stok: 0 }));
      } else {
        data = DEFAULTS.map((nama, i) => ({ id: i, nama, harga: 0, stok: 0 }));
      }
      document.getElementById('btnSave').disabled = false;
      render();
    }
  }

  async function simpan() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = '⏳ Menyimpan...';
    setSyncStatus('loading', 'Menyimpan...');

    const payload = {
      items: data,
      lastSaved: new Date().toISOString()
    };

    // Simpan lokal juga sebagai backup
    localStorage.setItem('stokku_hp', JSON.stringify(payload));

    try {
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `token ${TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: {
            [FILE]: { content: JSON.stringify(payload, null, 2) }
          }
        })
      });

      if (!res.ok) throw new Error('Gagal simpan');

      setSyncStatus('ok', 'Tersinkron ✓');
      const now = new Date().toLocaleString('id-ID');
      document.getElementById('lastSaved').textContent = 'Terakhir disimpan: ' + now;
      showToast('✅ Berhasil disimpan ke GitHub!', 'success');
    } catch (e) {
      setSyncStatus('error', 'Gagal simpan ke GitHub');
      showToast('⚠️ Gagal ke GitHub, tersimpan lokal', 'error');
    }

    btn.disabled = false;
    btn.textContent = '💾 Simpan ke GitHub';
  }

  function render() {
    const list = document.getElementById('itemList');
    list.innerHTML = '';

    data.forEach((item, i) => {
      const s = statusInfo(item.stok);
      const nilai = item.harga * item.stok;

      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `
        <div class="item-header">
          <div class="item-name-wrap">
            <div class="item-num">${i+1}</div>
            <input class="item-name" type="text" value="${escHtml(item.nama)}"
              placeholder="Nama barang..."
              oninput="data[${i}].nama=this.value; updateSummary()">
          </div>
          <div class="status-dot" id="dot${i}" style="background:${s.dot}"></div>
        </div>
        <div class="input-row">
          <div class="inp-group">
            <div class="inp-label">Harga Jual</div>
            <div class="inp-wrap">
              <span class="inp-prefix">Rp</span>
              <input type="number" inputmode="numeric" placeholder="0"
                value="${item.harga || ''}"
                oninput="data[${i}].harga=parseFloat(this.value)||0; updateCard(${i})">
            </div>
          </div>
          <div class="inp-group">
            <div class="inp-label">Stok</div>
            <div class="stok-wrap">
              <button class="stok-btn" onclick="changeStok(${i},-1)">−</button>
              <input type="number" inputmode="numeric" placeholder="0" id="stokInp${i}"
                value="${item.stok || ''}"
                oninput="data[${i}].stok=parseInt(this.value)||0; updateCard(${i})">
              <button class="stok-btn" onclick="changeStok(${i},1)">＋</button>
            </div>
          </div>
        </div>
        <div class="item-footer">
          <span class="badge ${s.cls}" id="badge${i}">${s.label}</span>
          <span class="nilai-barang">Nilai: <span id="nilai${i}">${fmtRp(nilai)}</span></span>
        </div>
      `;
      list.appendChild(card);
    });

    updateSummary();
  }

  function updateCard(i) {
    const item = data[i];
    const s = statusInfo(item.stok);
    const nilai = item.harga * item.stok;
    const badge = document.getElementById('badge'+i);
    const dot = document.getElementById('dot'+i);
    const nilaiEl = document.getElementById('nilai'+i);
    if (badge) { badge.textContent = s.label; badge.className = 'badge ' + s.cls; }
    if (dot) dot.style.background = s.dot;
    if (nilaiEl) nilaiEl.textContent = fmtRp(nilai);
    updateSummary();
  }

  function changeStok(i, delta) {
    data[i].stok = Math.max(0, (data[i].stok || 0) + delta);
    const inp = document.getElementById('stokInp'+i);
    if (inp) inp.value = data[i].stok || '';
    updateCard(i);
  }

  function updateSummary() {
    const totalStok = data.reduce((s,b) => s + (b.stok||0), 0);
    const totalNilai = data.reduce((s,b) => s + (b.harga||0)*(b.stok||0), 0);
    document.getElementById('sumStok').textContent = totalStok;
    document.getElementById('sumNilai').textContent = fmtRpFull(totalNilai);
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = 'toast', 3000);
  }

  // Load data dari Gist saat buka
  loadFromGist();
</script>
</body>
</html>
