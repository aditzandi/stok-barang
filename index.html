<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stok & Penjualan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --white: #ffffff;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --green: #10b981;
    --green-light: #ecfdf5;
    --red: #ef4444;
    --red-light: #fef2f2;
    --orange: #f59e0b;
    --orange-light: #fffbeb;
    --text: #1e293b;
    --muted: #94a3b8;
    --sub: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  .topbar {
    background: var(--accent);
    padding: 20px 20px 28px;
    position: relative; overflow: hidden;
  }

  .topbar::after {
    content: ''; position: absolute;
    bottom: -20px; left: 0; right: 0;
    height: 40px; background: var(--bg);
    border-radius: 24px 24px 0 0;
  }

  .topbar h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .topbar p { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  .sync-status {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 600;
  }

  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #a5f3c0; }
  .sync-dot.loading { background: #fde68a; animation: pulse 1s infinite; }
  .sync-dot.error { background: #fca5a5; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white); border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }

  .nav-btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 8px 14px; border: none; background: transparent;
    cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--muted); font-size: 11px; font-weight: 600;
    transition: color 0.2s; gap: 3px;
  }

  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  .page { display: none; }
  .page.active { display: block; }

  /* SUMMARY */
  .summary {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 0 16px;
    margin-top: -4px; position: relative; z-index: 1;
  }

  .sum-card {
    background: var(--white); border-radius: 16px;
    padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .sum-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .sum-val { font-size: 20px; font-weight: 800; margin-top: 4px; }
  .sum-val.green { color: var(--green); }
  .sum-val.accent { color: var(--accent); }
  .sum-val.orange { color: var(--orange); }

  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); padding: 20px 20px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .items { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }

  .item-card {
    background: var(--white); border-radius: 20px; padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 2px solid transparent; transition: border-color 0.2s;
  }

  .item-card:focus-within { border-color: var(--accent); }

  .item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .item-name-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }

  .item-num {
    width: 28px; height: 28px; background: var(--accent-light); color: var(--accent);
    border-radius: 8px; font-size: 13px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .item-name {
    font-size: 15px; font-weight: 700; border: none; outline: none;
    background: transparent; color: var(--text); width: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif; caret-color: var(--accent);
  }

  .item-name::placeholder { color: var(--muted); font-weight: 500; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .inp-group { display: flex; flex-direction: column; gap: 5px; }

  .inp-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); padding-left: 2px;
  }

  .inp-wrap {
    display: flex; align-items: center; background: var(--bg);
    border-radius: 12px; border: 1.5px solid var(--border); overflow: hidden; transition: border-color 0.2s;
  }

  .inp-wrap:focus-within { border-color: var(--accent); background: var(--accent-light); }

  .inp-prefix { padding: 0 8px 0 12px; font-size: 13px; font-weight: 600; color: var(--muted); user-select: none; }

  .inp-wrap input {
    border: none; outline: none; background: transparent;
    padding: 11px 12px 11px 0; font-size: 15px; font-weight: 700;
    color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
    width: 100%; -moz-appearance: textfield;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .stok-wrap {
    display: flex; align-items: center; background: var(--bg);
    border-radius: 12px; border: 1.5px solid var(--border); overflow: hidden;
  }

  .stok-wrap:focus-within { border-color: var(--accent); }

  .stok-btn {
    background: transparent; border: none; padding: 11px 14px;
    font-size: 18px; font-weight: 700; color: var(--sub);
    cursor: pointer; line-height: 1; user-select: none;
  }

  .stok-btn:active { background: var(--border); }

  .stok-wrap input {
    border: none; outline: none; background: transparent;
    padding: 11px 0; font-size: 16px; font-weight: 800;
    color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
    width: 100%; text-align: center; -moz-appearance: textfield;
  }

  .item-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }

  .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-orange { background: var(--orange-light); color: var(--orange); }
  .badge-red { background: var(--red-light); color: var(--red); }

  .nilai-barang { font-size: 12px; font-weight: 600; color: var(--sub); }
  .nilai-barang span { color: var(--accent); font-weight: 800; }

  .save-wrap { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 10px; }

  .btn-save {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 800;
    font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  }

  .btn-save:active { transform: scale(0.98); }
  .btn-save:disabled { opacity: 0.6; }
  .last-saved { text-align: center; font-size: 12px; color: var(--muted); font-weight: 500; }

  /* PENJUALAN */
  .jual-summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; padding: 0 16px;
    margin-top: -4px; position: relative; z-index: 1;
  }

  .jual-sum-card {
    background: var(--white); border-radius: 14px;
    padding: 12px 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center;
  }

  .jual-sum-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .jual-sum-val { font-size: 16px; font-weight: 800; margin-top: 3px; }

  .barang-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

  .barang-row {
    background: var(--white); border-radius: 16px; padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex; align-items: center; gap: 12px;
  }

  .barang-info { flex: 1; }
  .barang-nama { font-size: 14px; font-weight: 700; }
  .barang-harga { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }
  .barang-sisa { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .jual-counter {
    display: flex; align-items: center;
    background: var(--bg); border-radius: 12px;
    border: 1.5px solid var(--border); overflow: hidden;
  }

  .jual-btn {
    background: transparent; border: none;
    padding: 8px 12px; font-size: 18px; font-weight: 700;
    color: var(--sub); cursor: pointer; line-height: 1; user-select: none;
  }

  .jual-btn:active { background: var(--border); }
  .jual-qty { min-width: 36px; text-align: center; font-size: 16px; font-weight: 800; }

  .btn-catat {
    width: calc(100% - 32px); margin: 16px 16px 0;
    background: var(--green); color: #fff; border: none;
    border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 800;
    font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer;
    box-shadow: 0 4px 16px rgba(16,185,129,0.35); transition: transform 0.1s;
  }

  .btn-catat:active { transform: scale(0.98); }
  .btn-catat:disabled { opacity: 0.6; }

  /* RIWAYAT PAGE */
  .filter-bar {
    padding: 0 16px 4px;
    display: flex; gap: 8px; overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    white-space: nowrap;
    padding: 7px 14px; border-radius: 99px;
    font-size: 12px; font-weight: 700;
    border: 1.5px solid var(--border);
    background: var(--white); color: var(--sub);
    cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all 0.15s; flex-shrink: 0;
  }

  .filter-chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  .tanggal-group { padding: 0 16px; margin-bottom: 4px; }

  .tanggal-header {
    background: var(--white); border-radius: 14px; padding: 12px 16px;
    margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    cursor: pointer; user-select: none;
  }

  .tanggal-header-row {
    display: flex; align-items: center; justify-content: space-between;
  }

  .tanggal-label { font-size: 14px; font-weight: 800; color: var(--text); }
  .tanggal-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tanggal-omzet { font-size: 14px; font-weight: 800; color: var(--green); }
  .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  .transaksi-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; overflow: hidden; }
  .transaksi-list.collapsed { display: none; }

  .trx-item {
    background: var(--bg); border-radius: 10px; padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .trx-nama { font-size: 13px; font-weight: 700; }
  .trx-waktu { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .trx-qty { font-size: 12px; font-weight: 700; color: var(--red); text-align: right; }
  .trx-total { font-size: 12px; color: var(--green); font-weight: 700; text-align: right; margin-top: 1px; }

  .empty-state {
    text-align: center; padding: 40px 16px;
    color: var(--muted); font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

  .riwayat-summary {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 0 16px;
    margin-top: -4px; position: relative; z-index: 1;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 80px;
    left: 50%; transform: translateX(-50%) translateY(80px);
    color: #fff; padding: 12px 22px; border-radius: 99px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0; transition: transform 0.3s, opacity 0.3s;
    white-space: nowrap; z-index: 999; background: #1e293b;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { background: #065f46; }
  .toast.error { background: #7f1d1d; }
  .toast.warn { background: #78350f; }
</style>
</head>
<body>

<div class="topbar">
  <h1 id="topTitle">📦 Stok Barang</h1>
  <p id="topSub">Input harga &amp; stok</p>
  <div class="sync-status">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncText">Memuat data...</span>
  </div>
</div>

<!-- PAGE: STOK -->
<div class="page active" id="pageStok">
  <div class="summary">
    <div class="sum-card">
      <div class="sum-label">Total Stok</div>
      <div class="sum-val accent" id="sumStok">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Nilai Stok</div>
      <div class="sum-val green" id="sumNilai">—</div>
    </div>
  </div>
  <div class="section-title">Daftar Barang</div>
  <div class="items" id="itemList"></div>
  <div class="save-wrap">
    <button class="btn-save" id="btnSave" onclick="simpan()" disabled>💾 Simpan</button>
    <div class="last-saved" id="lastSaved"></div>
  </div>
</div>

<!-- PAGE: PENJUALAN -->
<div class="page" id="pageJual">
  <div class="jual-summary">
    <div class="jual-sum-card">
      <div class="jual-sum-label">Terjual Hari Ini</div>
      <div class="jual-sum-val accent" id="jualTotal">0</div>
    </div>
    <div class="jual-sum-card">
      <div class="jual-sum-label">Omzet Hari Ini</div>
      <div class="jual-sum-val green" id="jualOmzet">Rp0</div>
    </div>
    <div class="jual-sum-card">
      <div class="jual-sum-label">Transaksi</div>
      <div class="jual-sum-val orange" id="jualTrx">0</div>
    </div>
  </div>
  <div class="section-title">Pilih Barang</div>
  <div class="barang-list" id="barangList"></div>
  <button class="btn-catat" id="btnCatat" onclick="catatPenjualan()">✅ Catat Penjualan</button>
</div>

<!-- PAGE: RIWAYAT -->
<div class="page" id="pageRiwayat">
  <div class="riwayat-summary">
    <div class="sum-card">
      <div class="sum-label">Total Omzet</div>
      <div class="sum-val green" id="rwOmzet">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Total Transaksi</div>
      <div class="sum-val accent" id="rwTrx">—</div>
    </div>
  </div>

  <div class="section-title" style="padding-bottom:12px">
    <span>Filter Bulan</span>
  </div>
  <div class="filter-bar" id="filterBar"></div>

  <div class="section-title" style="margin-top:4px">Riwayat Penjualan</div>
  <div id="riwayatKonten"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navStok" onclick="showPage('stok')">
    <span class="nav-icon">📦</span><span>Stok</span>
  </button>
  <button class="nav-btn" id="navJual" onclick="showPage('jual')">
    <span class="nav-icon">🛒</span><span>Jual</span>
  </button>
  <button class="nav-btn" id="navRiwayat" onclick="showPage('riwayat')">
    <span class="nav-icon">📋</span><span>Riwayat</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const BIN_ID = '69cfabec856a682189f73bed';
  const MASTER_KEY = '$2a$10$1oYDHBq/NG4lryEQR0tmPeICB9AUm1hcmwh8GyAL1OGEcZmTJBCv6';
  const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const DEFAULTS = ['Beras 5kg','Minyak Goreng','Gula Pasir','Tepung Terigu','Kopi Sachet'];

  let data = [];       // stok barang
  let riwayat = [];    // semua riwayat transaksi [{tanggal, waktu, nama, qty, harga, total}]
  let jualQty = [];
  let filterBulan = 'semua';

  // ========== UTILS ==========
  function fmtRp(n) {
    if (n>=1000000) return 'Rp'+(n/1000000).toFixed(1).replace('.0','')+'jt';
    if (n>=1000) return 'Rp'+(n/1000).toFixed(0)+'rb';
    return 'Rp'+n;
  }

  function fmtRpFull(n) { return 'Rp'+Number(n).toLocaleString('id-ID'); }

  function fmtTanggal(tgl) {
    // tgl format: "2025-04-03"
    const [y,m,d] = tgl.split('-');
    const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return `${parseInt(d)} ${bulan[parseInt(m)-1]} ${y}`;
  }

  function fmtBulanLabel(key) {
    // key: "2025-04"
    const [y,m] = key.split('-');
    const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    return `${bulan[parseInt(m)-1]} ${y}`;
  }

  function getTanggalHariIni() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  }

  function getBulanKey(tgl) { return tgl.substring(0,7); }

  function statusInfo(s) {
    if (s===0) return {label:'❌ Habis',cls:'badge-red',dot:'#ef4444'};
    if (s<=5) return {label:'⚠️ Rendah',cls:'badge-orange',dot:'#f59e0b'};
    return {label:'✅ Aman',cls:'badge-green',dot:'#10b981'};
  }

  function setSyncStatus(state, text) {
    document.getElementById('syncDot').className = 'sync-dot'+(state==='loading'?' loading':state==='error'?' error':'');
    document.getElementById('syncText').textContent = text;
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg,type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show'+(type?' '+type:'');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.className='toast',3000);
  }

  // ========== NAVIGASI ==========
  function showPage(p) {
    ['stok','jual','riwayat'].forEach(pg => {
      document.getElementById('page'+pg.charAt(0).toUpperCase()+pg.slice(1)).classList.toggle('active', p===pg);
      document.getElementById('nav'+pg.charAt(0).toUpperCase()+pg.slice(1)).classList.toggle('active', p===pg);
    });
    const titles = { stok:['📦 Stok Barang','Input harga & stok'], jual:['🛒 Penjualan','Catat transaksi'], riwayat:['📋 Riwayat','Histori penjualan'] };
    document.getElementById('topTitle').textContent = titles[p][0];
    document.getElementById('topSub').textContent = titles[p][1];
    if (p==='jual') renderJual();
    if (p==='riwayat') renderRiwayat();
  }

  // ========== LOAD DATA ==========
  async function loadData() {
    setSyncStatus('loading','Memuat data...');
    try {
      const res = await fetch(API_URL+'/latest', { headers:{'X-Master-Key':MASTER_KEY} });
      if (!res.ok) throw new Error();
      const json = await res.json();
      const r = json.record;
      data = (r.items && r.items.length>0) ? r.items : DEFAULTS.map((n,i)=>({id:i,nama:n,harga:0,stok:0}));
      riwayat = r.riwayat || [];
      if (r.lastSaved) document.getElementById('lastSaved').textContent = 'Tersimpan: '+new Date(r.lastSaved).toLocaleString('id-ID');
      setSyncStatus('ok','Tersinkron ✓');
      document.getElementById('btnSave').disabled = false;
    } catch(e) {
      setSyncStatus('error','Pakai data lokal');
      const loc = localStorage.getItem('stokku_db');
      if (loc) {
        const parsed = JSON.parse(loc);
        data = parsed.items || DEFAULTS.map((n,i)=>({id:i,nama:n,harga:0,stok:0}));
        riwayat = parsed.riwayat || [];
      } else {
        data = DEFAULTS.map((n,i)=>({id:i,nama:n,harga:0,stok:0}));
        riwayat = [];
      }
      document.getElementById('btnSave').disabled = false;
    }
    jualQty = data.map(()=>0);
    render();
    updateJualSummary();
  }

  // ========== SIMPAN ==========
  function buildPayload() {
    return { items: data, riwayat: riwayat, lastSaved: new Date().toISOString() };
  }

  async function simpan() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';
    setSyncStatus('loading','Menyimpan...');
    const payload = buildPayload();
    localStorage.setItem('stokku_db', JSON.stringify(payload));
    try {
      const res = await fetch(API_URL, {
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error();
      setSyncStatus('ok','Tersinkron ✓');
      document.getElementById('lastSaved').textContent = 'Tersimpan: '+new Date().toLocaleString('id-ID');
      showToast('✅ Berhasil disimpan!','success');
    } catch(e) {
      setSyncStatus('error','Gagal simpan');
      showToast('⚠️ Tersimpan lokal saja','error');
    }
    btn.disabled = false; btn.textContent = '💾 Simpan';
  }

  async function simpanSilent() {
    const payload = buildPayload();
    localStorage.setItem('stokku_db', JSON.stringify(payload));
    try {
      await fetch(API_URL, {
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
        body: JSON.stringify(payload)
      });
      setSyncStatus('ok','Tersinkron ✓');
    } catch(e) { setSyncStatus('error','Gagal sinkron'); }
  }

  // ========== STOK ==========
  function render() {
    const list = document.getElementById('itemList');
    list.innerHTML = '';
    data.forEach((item,i) => {
      const s = statusInfo(item.stok);
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `
        <div class="item-header">
          <div class="item-name-wrap">
            <div class="item-num">${i+1}</div>
            <input class="item-name" type="text" value="${esc(item.nama)}" placeholder="Nama barang..."
              oninput="data[${i}].nama=this.value;updateSummary()">
          </div>
          <div class="status-dot" id="dot${i}" style="background:${s.dot}"></div>
        </div>
        <div class="input-row">
          <div class="inp-group">
            <div class="inp-label">Harga Jual</div>
            <div class="inp-wrap">
              <span class="inp-prefix">Rp</span>
              <input type="number" inputmode="numeric" placeholder="0" value="${item.harga||''}"
                oninput="data[${i}].harga=parseFloat(this.value)||0;updateCard(${i})">
            </div>
          </div>
          <div class="inp-group">
            <div class="inp-label">Stok</div>
            <div class="stok-wrap">
              <button class="stok-btn" onclick="chgStok(${i},-1)">−</button>
              <input type="number" inputmode="numeric" placeholder="0" id="si${i}" value="${item.stok||''}"
                oninput="data[${i}].stok=parseInt(this.value)||0;updateCard(${i})">
              <button class="stok-btn" onclick="chgStok(${i},1)">＋</button>
            </div>
          </div>
        </div>
        <div class="item-footer">
          <span class="badge ${s.cls}" id="badge${i}">${s.label}</span>
          <span class="nilai-barang">Nilai: <span id="nilai${i}">${fmtRp(item.harga*item.stok)}</span></span>
        </div>`;
      list.appendChild(card);
    });
    updateSummary();
  }

  function updateCard(i) {
    const item = data[i], s = statusInfo(item.stok);
    const b = document.getElementById('badge'+i);
    const d = document.getElementById('dot'+i);
    const n = document.getElementById('nilai'+i);
    if (b) { b.textContent=s.label; b.className='badge '+s.cls; }
    if (d) d.style.background=s.dot;
    if (n) n.textContent=fmtRp(item.harga*item.stok);
    updateSummary();
  }

  function chgStok(i,delta) {
    data[i].stok = Math.max(0,(data[i].stok||0)+delta);
    const inp = document.getElementById('si'+i);
    if (inp) inp.value = data[i].stok||'';
    updateCard(i);
  }

  function updateSummary() {
    document.getElementById('sumStok').textContent = data.reduce((s,b)=>s+(b.stok||0),0);
    document.getElementById('sumNilai').textContent = fmtRpFull(data.reduce((s,b)=>s+(b.harga||0)*(b.stok||0),0));
  }

  // ========== PENJUALAN ==========
  function renderJual() {
    const list = document.getElementById('barangList');
    list.innerHTML = '';
    data.forEach((item,i) => {
      const habis = item.stok === 0;
      const row = document.createElement('div');
      row.className = 'barang-row';
      row.style.opacity = habis ? '0.5' : '1';
      row.innerHTML = `
        <div class="barang-info">
          <div class="barang-nama">${esc(item.nama)}</div>
          <div class="barang-harga">${fmtRp(item.harga)}</div>
          <div class="barang-sisa">Sisa stok: <b id="sisa${i}">${item.stok}</b></div>
        </div>
        <div class="jual-counter">
          <button class="jual-btn" onclick="chgJual(${i},-1)" ${habis?'disabled':''}>−</button>
          <div class="jual-qty" id="jq${i}">${jualQty[i]||0}</div>
          <button class="jual-btn" onclick="chgJual(${i},1)" ${habis?'disabled':''}>＋</button>
        </div>`;
      list.appendChild(row);
    });
    updateJualSummary();
  }

  function chgJual(i,delta) {
    jualQty[i] = Math.max(0, Math.min(data[i].stok, (jualQty[i]||0)+delta));
    const el = document.getElementById('jq'+i);
    if (el) el.textContent = jualQty[i];
  }

  function updateJualSummary() {
    const tgl = getTanggalHariIni();
    const hari = riwayat.filter(r => r.tanggal === tgl);
    document.getElementById('jualTotal').textContent = hari.reduce((s,r)=>s+r.qty,0);
    document.getElementById('jualOmzet').textContent = fmtRp(hari.reduce((s,r)=>s+r.total,0));
    document.getElementById('jualTrx').textContent = hari.length;
  }

  function catatPenjualan() {
    if (!jualQty.some(q=>q>0)) { showToast('⚠️ Pilih barang dulu!','warn'); return; }

    const btn = document.getElementById('btnCatat');
    btn.disabled = true;

    const tgl = getTanggalHariIni();
    const now = new Date();
    const waktu = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

    jualQty.forEach((qty,i) => {
      if (qty>0) {
        data[i].stok = Math.max(0, data[i].stok - qty);
        riwayat.unshift({
          tanggal: tgl,
          waktu,
          nama: data[i].nama,
          qty,
          harga: data[i].harga,
          total: qty * data[i].harga
        });
      }
    });

    jualQty = data.map(()=>0);
    simpanSilent().then(()=>{ btn.disabled = false; });
    renderJual();
    updateSummary();
    updateJualSummary();
    showToast('✅ Penjualan dicatat!','success');
  }

  // ========== RIWAYAT ==========
  function renderRiwayat() {
    // Buat daftar bulan unik
    const bulanSet = new Set(riwayat.map(r => getBulanKey(r.tanggal)));
    const bulanList = Array.from(bulanSet).sort().reverse();

    // Filter bar
    const filterBar = document.getElementById('filterBar');
    filterBar.innerHTML = '';

    const allChip = document.createElement('button');
    allChip.className = 'filter-chip'+(filterBulan==='semua'?' active':'');
    allChip.textContent = 'Semua';
    allChip.onclick = () => { filterBulan='semua'; renderRiwayat(); };
    filterBar.appendChild(allChip);

    bulanList.forEach(key => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip'+(filterBulan===key?' active':'');
      chip.textContent = fmtBulanLabel(key);
      chip.onclick = () => { filterBulan=key; renderRiwayat(); };
      filterBar.appendChild(chip);
    });

    // Filter data
    const filtered = filterBulan==='semua' ? riwayat : riwayat.filter(r => getBulanKey(r.tanggal)===filterBulan);

    // Summary
    document.getElementById('rwOmzet').textContent = fmtRpFull(filtered.reduce((s,r)=>s+r.total,0));
    document.getElementById('rwTrx').textContent = filtered.length;

    // Group by tanggal
    const grouped = {};
    filtered.forEach(r => {
      if (!grouped[r.tanggal]) grouped[r.tanggal] = [];
      grouped[r.tanggal].push(r);
    });

    const tanggalList = Object.keys(grouped).sort().reverse();
    const konten = document.getElementById('riwayatKonten');
    konten.innerHTML = '';

    if (tanggalList.length === 0) {
      konten.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Belum ada riwayat penjualan</p></div>`;
      return;
    }

    tanggalList.forEach((tgl, idx) => {
      const trxs = grouped[tgl];
      const omzetHari = trxs.reduce((s,r)=>s+r.total,0);
      const tglLabel = fmtTanggal(tgl);
      const isToday = tgl === getTanggalHariIni();

      const group = document.createElement('div');
      group.className = 'tanggal-group';

      const header = document.createElement('div');
      header.className = 'tanggal-header';

      const chevronId = 'chev'+idx;
      const listId = 'tlist'+idx;

      header.innerHTML = `
        <div class="tanggal-header-row">
          <div>
            <div class="tanggal-label">${tglLabel}${isToday?' <span style="font-size:10px;background:#eef2ff;color:#6366f1;padding:2px 8px;border-radius:99px;font-weight:700">Hari Ini</span>':''}</div>
            <div class="tanggal-sub">${trxs.length} transaksi · ${trxs.reduce((s,r)=>s+r.qty,0)} item</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="tanggal-omzet">${fmtRp(omzetHari)}</div>
            <div class="chevron open" id="${chevronId}">▼</div>
          </div>
        </div>`;

      const list = document.createElement('div');
      list.className = 'transaksi-list';
      list.id = listId;

      trxs.forEach(r => {
        const item = document.createElement('div');
        item.className = 'trx-item';
        item.innerHTML = `
          <div>
            <div class="trx-nama">${esc(r.nama)}</div>
            <div class="trx-waktu">🕐 ${r.waktu}</div>
          </div>
          <div>
            <div class="trx-qty">−${r.qty} pcs</div>
            <div class="trx-total">+${fmtRp(r.total)}</div>
          </div>`;
        list.appendChild(item);
      });

      header.onclick = () => {
        const l = document.getElementById(listId);
        const c = document.getElementById(chevronId);
        l.classList.toggle('collapsed');
        c.classList.toggle('open');
      };

      group.appendChild(header);
      group.appendChild(list);
      konten.appendChild(group);
    });
  }

  loadData();
</script>
</body>
</html>
